<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
  <style>
    :root { --bg:#fffef6; --brand:#ca5c00; --text:#28221c; --card:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:linear-gradient(130deg,#fffbf1,#eef8ff 50%,#f8fff4); }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 20px 12px 24px; }
    .card { background:var(--card); border-radius:16px; box-shadow:0 12px 32px rgba(0,0,0,.08); padding:18px; border:1px solid #e9e1d6; }
    .top { display:grid; grid-template-columns: 2fr 1fr; gap:12px; align-items:start; }
    .panel { display:flex; flex-direction:column; gap:10px; }
    textarea { width:100%; min-height:96px; border-radius:12px; border:1px solid #d6e1ea; padding:10px; resize:vertical; }
    select, button { border-radius:12px; border:1px solid #d6e1ea; padding:10px 12px; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    button { background:var(--brand); color:#fff; border:none; cursor:pointer; }
    iframe { width:100%; height:68vh; border:none; border-radius:14px; background:#fff; margin-top:12px; }
    .fab { position:fixed; right:22px; bottom:22px; width:56px; height:56px; border-radius:50%; background:#0d7c66; color:#fff; border:none; font-size:24px; box-shadow:0 12px 22px rgba(0,0,0,.28); }
    .drawer { position:fixed; right:22px; bottom:90px; width:min(360px,90vw); background:#fff; border-radius:14px; box-shadow:0 12px 28px rgba(0,0,0,.2); padding:14px; }
    .muted { color:#607080; font-size:13px; }
    @media (max-width:900px){ .top{grid-template-columns:1fr;} .btn-row button{flex:1;} }
  </style>
</head>
<body>
<div id="app" class="wrap">
  <div class="card">
    <div class="top">
      <div class="panel">
        <textarea v-model="requirement" placeholder="输入网站需求。默认会生成 Python 后端 + Vue 前端。"></textarea>
      </div>
      <div class="panel">
        <select v-model="builder">
          <option value="llm">调用大模型</option>
          <option value="codex">调用Codex</option>
        </select>
        <div class="btn-row">
          <button @click="build">制作网站</button>
          <button @click="runTest">Chrome DevTools MCP测试</button>
        </div>
      </div>
    </div>
    <p class="muted">新网站地址：<a :href="previewUrl" target="_blank">{{ previewUrl }}</a></p>
    <iframe :src="previewUrl"></iframe>
  </div>

  <button class="fab" @click="showAdjust = !showAdjust">⚙</button>
  <div class="drawer" v-if="showAdjust">
    <textarea v-model="adjustText" placeholder="输入你想对新网站做的调整"></textarea>
    <button @click="adjust">提交调整并自动重启</button>
  </div>
</div>
<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      requirement: '',
      builder: 'llm',
      previewUrl: 'http://localhost:18081',
      showAdjust: false,
      adjustText: ''
    }
  },
  methods: {
    async build() {
      const r = await axios.post('/api/build-site', { requirement: this.requirement, builder: this.builder });
      this.previewUrl = r.data.preview_url || this.previewUrl;
      this.reloadFrame();
    },
    async adjust() {
      await axios.post('/api/adjust-site', { instruction: this.adjustText });
      this.adjustText = '';
      this.showAdjust = false;
      this.reloadFrame();
    },
    async runTest() {
      const r = await axios.post('/api/test-site');
      alert(r.data.ok ? 'MCP测试触发成功' : `MCP测试失败: ${r.data.message}`);
    },
    reloadFrame() {
      const url = new URL(this.previewUrl);
      url.searchParams.set('ts', Date.now().toString());
      this.previewUrl = url.toString();
    }
  }
}).mount('#app')
</script>
</body>
</html>
