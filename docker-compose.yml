services:
  main-service:
    build:
      context: .
      dockerfile: main_service/Dockerfile
    container_name: main-service
    ports:
      - "18080:8080"
    volumes:
      - ./data:/shared
      - ./generated_site:/generated_site
    depends_on:
      - new-site

  new-site:
    build:
      context: .
      dockerfile: new_site/Dockerfile
    container_name: new-site
    ports:
      - "18081:8081"
    volumes:
      - ./data:/shared
      - ./generated_site:/generated_site
