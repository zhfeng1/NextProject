server {
    listen 80;
    server_name localhost;

    # 静态前端资源存放位置
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 支持 Vue Router （history模式）当匹配不到请求路径时 fallback 给 index.html 处理
        try_files $uri $uri/ /index.html;
    }

    # 站点预览反向代理至后端的 main-service
    location /preview/ {
        proxy_pass http://main-service:8080/preview/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 接口反向代理至后端的 main-service
    location /api/ {
        proxy_pass http://main-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API WebSocket 升级代理至后端的 main-service
    location /ws/ {
        proxy_pass http://main-service:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
